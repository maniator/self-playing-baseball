name: Copilot Setup Steps

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    # NOTE:
    # Avoid `container:` here. Copilot's internal bootstrap steps may run with /bin/sh
    # and use bash-specific options (e.g. pipefail), which can fail inside some containers.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      # Pre-install the Playwright MCP server package so the npx cache is warm
      # when the Copilot agent starts.  The local MCP config in
      # .github/copilot/mcp.json instructs GitHub to launch the Playwright MCP
      # via `npx -y @playwright/mcp@0.0.40`; pre-installing here ensures that
      # command resolves instantly from cache rather than downloading on-demand.
      # The `--allowed-origins` in mcp.json includes blipit.net so the agent
      # can navigate to the production site during live-browser QA sessions.
      - name: Pre-install Playwright MCP server
        run: npx --yes @playwright/mcp@0.0.40 --help 2>/dev/null || true

      # Pre-pull the Playwright container image so the e2e-test-runner agent
      # can run `docker run` commands immediately without a download delay.
      # Docker is pre-installed on GitHub-hosted ubuntu-latest runners.
      # NOTE: This is a plain `docker pull` step on the host — NOT a `container:`
      # block.  The `container:` key must never be added to this job because
      # Copilot's bootstrap steps may fail inside containers due to /bin/sh vs
      # bash shell compatibility issues (e.g. pipefail).
      - name: Pre-pull Playwright Docker image
        run: docker pull mcr.microsoft.com/playwright:v1.58.2-noble
